services:
  postgres:
    image: postgres:16-alpine
    container_name: lutron-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lutron
      POSTGRES_PASSWORD: lutron
      POSTGRES_DB: lutron
    ports:
      - "5432:5432"
    volumes:
      - lutron_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lutron -d lutron"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lutron-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - lutron_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lutron_pg_data:
  lutron_redis_data:
